<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculadora">

    <input type="text" class="visor" placeholder="0" readonly>

    <button class="cinza">AC</button>
    <button class="cinza">+/-</button>
    <button class="cinza">%</button>
    <button class="laranja">÷</button>

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="laranja">×</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="laranja">−</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button class="laranja">+</button>

    <button class="zero">0</button>
    <button>,</button>
    <button class="laranja">=</button>

</div>

</body>
</html>
